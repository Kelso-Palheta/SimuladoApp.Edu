<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>{{TITULO}}</title>

  <!-- Reveal.js + GSAP -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.0.4/reveal.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.0.4/theme/black.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/TextPlugin.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #E50914;
      --accent: #00F0FF;
      --bg: #000;
    }

    /* Ajuste de escala base para evitar o "zoom imenso" */
    body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; overflow: hidden; }
    .reveal { font-size: 20px; font-weight: 300; }

    /* HUD Elements - mais sutis */
    .hud-overlay {
      position: fixed; inset: 0; pointer-events: none; z-index: 999;
      background: linear-gradient(90deg, var(--bg) 1px, transparent 1px) 0 0 / 100px 100px,
                  linear-gradient(0deg, var(--bg) 1px, transparent 1px) 0 0 / 100px 100px;
      opacity: 0.05;
    }

    /* Tipografia ajustada e sem sombras borradas */
    .reveal h1, .reveal h2, .reveal h3 {
      font-family: 'Bebas Neue', sans-serif;
      text-transform: uppercase;
      margin: 0;
      line-height: 1.1;
      text-shadow: none; /* Sombras removidas para leitura limpa */
    }

    .reveal h1 { font-size: 5em; letter-spacing: 2px; color: #fff; }
    
    .reveal h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 2em;
      color: var(--accent);
      margin-bottom: 20px;
    }

    .reveal p { 
      font-size: 1.2em; 
      line-height: 1.5; 
      color: #FFFFFF; 
      margin-bottom: 15px;
      text-shadow: none; /* Sombra removida completamente */
    }

    /* Glitch Effect - Apenas na capa */
    .glitch { position: relative; display: inline-block; }
    .glitch::before, .glitch::after {
      content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: transparent;
    }
    .glitch::before { left: 2px; text-shadow: -1px 0 #ff00c1; clip: rect(24px, 550px, 90px, 0); animation: glitch-anim 3s infinite linear alternate-reverse; }
    .glitch::after { left: -2px; text-shadow: -1px 0 #00fff9; animation: glitch-anim2 2s infinite linear alternate-reverse; }
    @keyframes glitch-anim { 0% { clip: rect(10px, 9999px, 30px, 0); } 100% { clip: rect(50px, 9999px, 60px, 0); } }
    @keyframes glitch-anim2 { 0% { clip: rect(40px, 9999px, 80px, 0); } 100% { clip: rect(5px, 9999px, 15px, 0); } }

    /* Cards e Containers com leitura impecável */
    .disruptor-card {
      background: rgba(10,10,10,0.85); /* Mais escuro */
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 15px;
    }

    .content-text {
      background: rgba(0,0,0,0.8); /* Fundo bem escuro para o texto */
      padding: 30px;
      border-radius: 12px;
      border-left: 4px solid var(--accent);
      max-height: 550px; /* Limite fixo seguro para a resolução 1280x720 */
      overflow-y: auto; /* Permite rolar se o texto for muito grande */
    }

    /* Overlay do Background */
    .reveal section[data-background-video]::after,
    .reveal section[data-background-image]::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 100%);
      z-index: 0;
    }

    .reveal section > * {
      position: relative;
      z-index: 1;
    }

    .reveal section { padding: 40px !important; box-sizing: border-box; }

    /* Grid Layout */
    .grid-container {
      display: grid;
      grid-template-columns: 1fr 0.4fr;
      gap: 30px;
      align-items: flex-start;
      height: 100%;
      max-height: 100%;
    }

    .reveal .progress { height: 6px; }
    .reveal .progress span { background: var(--primary); }

    /* Scrollbar customizada para a div de texto */
    .content-text::-webkit-scrollbar { width: 8px; }
    .content-text::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 4px; }
    .content-text::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
  </style>
</head>
<body>
  <div class="hud-overlay"></div>
  <div class="reveal">
    <div class="slides">
      {{SLIDES}}
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.0.4/reveal.min.js"></script>
  <script>
    Reveal.initialize({
      hash: true, controls: true, progress: true, center: true,
      transition: 'none', backgroundTransition: 'fade',
      width: 1280, height: 720, margin: 0.04, /* Resolução HD padrão, sem zoom exagerado */
      minScale: 0.5, maxScale: 1.5
    });

    Reveal.on('slidechanged', event => {
      const slide = event.currentSlide;
      
      gsap.fromTo(slide.querySelectorAll('.reveal-impact'), 
        { y: 30, opacity: 0 },
        { y: 0, opacity: 1, duration: 1, ease: "power3.out", stagger: 0.15 }
      );

      gsap.fromTo(slide.querySelectorAll('.disruptor-card'),
        { x: 50, opacity: 0 },
        { x: 0, opacity: 1, duration: 1, delay: 0.3, ease: "power2.out", stagger: 0.1 }
      );
    });
  </script>
</body>
</html>
